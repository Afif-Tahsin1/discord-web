<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Afi CMD</title>
    <link rel="shortcut icon" href="afilogo.png" type="image/x-icon">
    <style>
        input {
            background-color: grey;
            color: aliceblue;
            height: 40px;
            width: 350px;
            margin-left: 70px;
        }

        div {
            text-align: center;
            background-color: black;
            box-shadow: 10px 10px 10px grey;
            width: 500px;
            color: white;
            margin-left: 30%;
            border-radius: 50px;
            display: flex;
            flex-direction: column;
            overflow: auto;

        }

        button {
            margin-left: 10%;
            width: 300px;
            margin-bottom: 10px;
            border-radius: 30px;
            cursor: pointer;
            padding: 20px;
            font-size: 15px;
        }

        ol {
            height: 200px;
            overflow-y: auto;
            list-style-type: none;
        }

        .usermessage {
            text-align: right;
        }

        li {
            background-color: cyan;
            margin-top: 10px;
            word-break: break-all;
            color: black;
        }

        .botmessage {
            text-align: left;
        }
    </style>
</head>

<body>
    <div id="signin">
        <h1>Name</h1>
        <p>Enter your name here:</p>
        <input type="text" id="name" placeholder="here...">
        <p id="error"></p>
        <button onclick="sign()">Done</button>
    </div>
    <div id="main" style="display: none;">
        <p id="username"></p>
        <input type="text" id="commands">
        <button onclick="on_command_create()">Create commands</button>
        <ol id="messagelist"></ol>
    </div>
    <script type="importmap">
      {
        "imports": {
          "@google/generative-ai": "https://esm.run/@google/generative-ai"
        }
      }
    </script>
    <script type="module">
        const apikey = process.env.API_KEY || "TESTING_KEY";
        import { GoogleGenerativeAI } from "@google/generative-ai";
        const genAi = new GoogleGenerativeAI(apikey);
        const model = genAi.getGenerativeModel({ model: "gemini-3-flash-preview" });
        const fruits = ["rocket", "spin", "blade", "spring", "bomb", "smoke", "spike", "flame", "dark", "sand", "ice", "rubber", "eagle", "ghost", "light", "diamond", "quake", "magma", "love", "spider", "sound", "phoenix", "creation", "blizzard", "buddha", "portal", "shadow", "venom", "spirit", "mammonth", "gravity", "trex", "dough", "gas", "lightning", "tiger", "yeti", "kitsune", "control", "dragon", "dragoneast", "dragonwest"];
        const botname = "Afi";
        const messageL = document.getElementById("messagelist");
        const errorp = document.getElementById("error");
        let name;
        let messages = 0;
        const signdiv = document.getElementById("signin");
        const maindiv = document.getElementById("main");
        let cancreate = true;
        function sign() {
            const user_name = document.getElementById("name").value;
            const nameP = document.getElementById("username");

            if (user_name.length > 20 || user_name.length < 3) {
                return errorp.textContent = "The name must be more than 3 and less than 20 characters!";
            }
            name = user_name;
            nameP.textContent = `Name: ${user_name}`;
            signdiv.style.display = "none";
            maindiv.style.display = "block";
        }
        function on_command_create() {
            if (!cancreate) { return }
            messages += 1;
            const command = document.getElementById("commands").value;
            if (!command.trim()) return;
            const message = document.createElement("li");
            message.className = "usermessage";
            message.id = `message_${messages}`;
            const nameSpan = document.createElement("span");
            nameSpan.style.color = "blue";
            nameSpan.textContent = "[" + messages + "]" + name + ":";
            const breaks = document.createElement("br");
            const commandSpan = document.createElement("span");
            commandSpan.textContent = command;
            document.getElementById("commands").value = "";
            message.appendChild(breaks);
            message.appendChild(breaks);
            message.appendChild(nameSpan);
            message.appendChild(breaks);
            message.appendChild(commandSpan);
            messageL.appendChild(message);
            const idk = command.split(" ");
            const commandname = idk[0];
            const does = idk[1];


            if (commandname != "afi") {
                return send_message(`'${commandname}' is not recognized as an internal or external command,operable program or batch file.`);
            }
            if (does === "hello" || does === "hi") {
                send_message(`Hello, ${name}! I'm your assistance type afi help for help`)
            } else if (does === "help") {
                send_message(`Hey ${name}, I'm Afi. Here are my features:
                - help : Show this command list.
                - roll : Roll a random Blox Fruit.
                - random [no] : Get a random number from 0 to [no].
                - randomword [w1,w2] : Picks a random word from your list.
                - say [text] : Make me repeat your [text].
                - install [name] : Simulate a fake installation process.
                - search [query] : Search anything on Google.
                - open [link] : Open any website link directly.
                - delete [no] : Remove message number [no].
                - clear : Wipe the screen clean.
                - time : Show current time (H:M:S).
                - date : Show today's date (D/M/Y).
                - day : Tell you what day it is today.
                - info : See bot and owner information.
                - changename : Restart and change your name.
                - version : Show current version.

                Note: Do not type []. Replace them with your words or numbers!`);
            }
            else if (does === "roll") {
                const randomn = Math.floor(Math.random() * fruits.length);
                const randomf = fruits[randomn];
                send_message(`Congrats ${name}! You've rolled ${randomf}!`);
            } else if (does === "version") {
                send_message("I'm your assistance. My version is 1.06 | Added ai features");
            } else if (does === "say" || does === "tell") {
                const illsay = idk.slice(2).join(" ");
                if (!illsay) {
                    return send_message("Provide a message first!");
                }
                send_message(illsay);
            } else if (does === "delete" || does === "remove") {
                const messagetd = idk[2];
                const messagetdN = Number(messagetd);
                if (!messagetd) {
                    return send_message("Pls provide e message number first!");
                }
                if (isNaN(messagetdN)) {
                    return send_message("The message no. must be in number!");
                }
                const messaged = document.getElementById("message_" + messagetdN);

                if (!messaged) {
                    return send_message(`${messagetd}no. message not found!`);
                }
                if (messaged.className != "usermessage") {
                    return send_message("You can't delete service's message!");
                }
                messaged.remove();
                send_message(`Message ${messagetd} has been deleted!`);
            } else if (does === "clear") {
                const allMessages = document.querySelectorAll("#messagelist li");
                allMessages.forEach(msg => msg.remove());
                messages = 0;
            } else if (does === "random") {
                const betweenR = idk[2];
                if (!betweenR) {
                    return send_message("Pls provide start number or end number first!");
                }
                const random = Math.floor(Math.random() * betweenR);
                send_message(`Random number: ${random}`);
            } else if (does === "install") {
                const toInstall = idk[2];
                if (!toInstall) {
                    return send_message("Pls provide a name first!");
                }
                cancreate = false;
                send_message(`Opening ${toInstall}... 1/5 This might take a moments`);
                setTimeout(function () {
                    send_message(`Collecting data from ${toInstall}... 2/5`);
                    setTimeout(function () {
                        send_message(`Loading the current version of ${toInstall}... 3/5`);
                        setTimeout(function () {
                            send_message(`Installing ${toInstall}... 4/5`);
                            setTimeout(function () {
                                send_message(`Successfully installed ${toInstall} at C://User/PCNAME/Downloads/${toInstall}! 5/5`);
                                cancreate = true;
                            }, 3000);
                        }, 3000);
                    }, 3000);
                }, 3000);
            } else if (does === "search") {
                const url = idk.slice(2).join(" ");
                const format = url.replaceAll(" ", "+");
                if (!url) {
                    return send_message("Pls provide a search first!");
                }
                window.open("https://www.google.com/search?q=" + format);
                send_message(`Searching for ${format}...`);
            } else if (does === "randomword" || does === "randomwords") {
                const wta = idk.slice(2).join(" ");
                const format = wta.split(",");
                if (!wta) {
                    return send_message("Pls provide words first!");
                }
                const randomN = Math.floor(Math.random() * format.length);
                const randomW = format[randomN];
                send_message(`Random words: ${randomW.trim()}`);
            } else if (does === "changename" || does === "changenames") {
                location.reload();
            } else if (does === "open") {
                const url = idk.slice(2).join(" ");
                const format = url.replaceAll(" ", "+");
                if (!url) {
                    return send_message("Pls provide a link first!");
                }
                window.open(format);
                send_message(`Opening ${url}...`)
            } else if (does === "info" || does === "about") {
                send_message(`I'm afi, your assistance. It was made for fun.
                Owner: Afif Tahsin. My version: 1.00.
                Type afi help if you need any help`);
            } else if (does === "time") {
                const now = new Date();
                send_message(`Current time: ${now.toLocaleTimeString()} (Hours: Minutes: Seconds, Format)`);
            } else if (does === "date") {
                const now = new Date();
                send_message(`Current date: ${now.toLocaleDateString()}(Date, Month, Year)`);
            } else if (does === "day") {
                const day = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday",];
                const now = new Date();
                const today = day[now.getDay()];
                send_message(`Today is ${today}`);
            } else if (does === "fulltime") {
                const day = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday",];
                const now = new Date();
                send_message(`Today's time is: ${now.toLocaleTimeString()}, Today's date is ${now.toLocaleDateString()}, Today is ${day[now.getDay()]}`)
            } else if (does === "ai") {
                const prompt = idk.slice(2).join(" ");
                const fullmessage = `Hello, you are Afi CMD. I'm ${name}, prompt: ${prompt}. Version: 1.06 | Added ai features.:
                `;
                model.generateContent(fullmessage)
                    .then(result => {
                        const response = result.response;
                        const text = response.text();
                        send_message(text); // AI-er uttor-ta screen-e pathiye diche.
                    })
                    .catch(error => {
                        // A-Z: Jodi API Key bhul hoy ba internet na thake, tobe error dekhabe.
                        send_message("AI Error: " + error.message);
                    });
            }
            else {
                send_message(`Unknown command: ${does}. To see all afi commands, type: afi help`);
            }
            messageL.scrollTop = messageL.scrollHeight;
        }
        function send_message(text) {
            messages += 1
            const message = document.createElement("li");
            message.className = "botmessage";
            message.id = `message_${messages}`;
            const nameSpan = document.createElement("span");
            nameSpan.style.color = "blue";
            nameSpan.textContent = "[" + messages + "]" + "(service)" + ":";
            const breaks = document.createElement("br");
            const messageSpan = document.createElement("span");
            messageSpan.textContent = text;
            message.appendChild(breaks);
            message.appendChild(breaks);
            message.appendChild(nameSpan);
            message.appendChild(breaks);
            message.appendChild(messageSpan);
            messageL.appendChild(message);
        }
        window.onload = function () {
            send_message(`Type afi help or press "?" for help`);
        };

        window.addEventListener('keydown', function (event) {
            const isinput = event.target.tagName === "INPUT";
            if (isinput) {
                if (event.key === "Enter") {
                    on_command_create();
                }
            }
            if (!isinput) {
                if (event.key === "?") {
                    send_message(`Hey ${name}, I'm Afi. Here are my features:
                - help : Show this command list.
                - roll : Roll a random Blox Fruit.
                - random [no] : Get a random number from 0 to [no].
                - randomword [w1,w2] : Picks a random word from your list (use comma).
                - say [text] : Make me repeat your [text].
                - install [name] : Simulate a fake installation process.
                - search [query] : Search anything on Google.
                - open [link] : Open any website link directly.
                - delete [no] : Remove message number [no].
                - clear : Wipe the screen clean.
                - info : See bot and owner information.
                - changename : Restart and change your name.
                - version : Show current version.

                Note: Do not type []. Replace them with your words or numbers!`);
                }
            }

        });
        window.sign = sign;
        window.on_command_create = on_command_create;
    </script>

</body>

</html>
